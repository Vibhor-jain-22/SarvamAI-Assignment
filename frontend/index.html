<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bike Troubleshooting Assistant (RAG)</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <div class="title">Bike Troubleshooting Assistant</div>
          <div class="subtitle">Answers strictly from your uploaded manual (RAG) · UI v2</div>
        </div>
        <div class="status" id="status">No manual uploaded</div>
      </header>

      <section class="panel">
        <div class="upload">
          <label class="button">
            <input id="pdfInput" type="file" accept="application/pdf" />
            Upload manual PDF
          </label>
        </div>
      </section>

      <main class="chat" id="chat"></main>

      <footer class="composer">
        <input id="question" type="text" placeholder="Ask a question from the manual…" autocomplete="off" />
        <button id="sendBtn" class="button primary">Send</button>
      </footer>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
